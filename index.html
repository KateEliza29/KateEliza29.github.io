<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kebbers Kebbers Kebbers</title>

  <body>
	  <p>NaN functionality</p>
	<p>Input type=number:</p>
	  <input type="number" id="textInput">
	  <br>
	  inputValue = <p id="inputValue"></p>
	  isNaN = <p id="isNaN"></p>
	  <br>
	  <br>
	  <p>input.data</p>
	  <input type="number" id="textInput2">
	  <br>
	  input.Data Value = <p id="inputDataValue"></p>
	  8
	<script>


document.getElementById("textInput").addEventListener('input', logKey);
let previousValue = null;
    function logKey(e) {
	let dataValue = e.data;
	console.log("e.data = " + e.data);
	if (dataValue == '-' || '+') {
		e.target.value = previousValue;
		console.log("(if) e.target.value = " + e.target.value);
	}
	else {
		previousValue = e.target.value;	
		console.log("(else) previous value set to e.target.value = " + previousValue);
	}
	document.getElementById("inputValue").innerHTML = dataValue;
	document.getElementById("isNaN").innerHTML = isNaN(dataValue);
    }


document.getElementById("textInput2").addEventListener('input', logKey2);
    function logKey2(e) {

	let inputValue = e.target.valueAsNumber;
	    if (isNaN(inputValue)) {
		e.target.value = previousValue;	
	    }
	    else {
		previousValue = e.target.value;
	    }


	    
	let inputDataValue = e.data;
	document.getElementById("inputDataValue").innerHTML = inputDataValue;
	if (!inputDataValue.match(/^[0-9]+$/)) {
	    e.preventDefault();
	}
	let valval = this.value;
	console.log("this.value " + valval);
    }


	</script>
  </body>
