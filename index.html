<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Kebbers Kebbers Kebbers</title>
  </head>
  <body>

	  <input type="text">
	  e.key = <p id="keyPressed"></p>
	  e.code = <p id="keyPressed1"></p>
	  e.keycode = <p id="keyPressed2"></p>
	  e.which = <p id="keyPressed3"></p>

	  Ahoy
	<script>


 document.addEventListener('keydown', logKey);
    function logKey(e) {
	document.getElementById("keyPressed").innerHTML = e.key;
	    document.getElementById("keyPressed1").innerHTML = e.code;
	    document.getElementById("keyPressed2").innerHTML = e.keyCode;
	    document.getElementById("keyPressed3").innerHTML = e.which;
    }
	</script>
  </body>
</html>
