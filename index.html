<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">

  <body>

	  <input type="text" id="textInput">
	  <br>
	  onInput = <p id="onInput"></p>
	  onChange = <p id="onChange"></p>

	  Input5
	<script>


 document.getElementById("textInput").addEventListener('input', logKey);
document.getElementById("textInput").addEventListener('change', logKey);
    function logKey(e) {
	let selectStart = e.target.selectionStart;
	console.log("selectStart = " + selectStart);
	console.log("value = " + e.target.value;
	    document.getElementById("onInput").innerHTML = e.target.value;
	let lastTyped = e.target.value.substr(selectStart, 1);
	console.log("lastTyped = " + lastTyped);
	document.getElementById("onInput").innerHTML = lastTyped;
	    console.log("logKey triggered");
    }


	</script>
  </body>
