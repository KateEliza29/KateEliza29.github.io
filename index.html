<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Kebbers Kebbers Kebbers</title>
  </head>
  <body>

	  <input type="text">
	  <br>
	  onInput = <p id="onInput"></p>
	  onChange = <p id="onChange"></p>

	  Input
	<script>


 document.addEventListener('input', logKey);
    function logKey(e) {
	let selectStart = e.target.selectionStart;
	let lastTyped = e.target.value.substr(selectStart, 1);
	document.getElementById("onInput").innerHTML = lastTyped;
    }

 document.addEventListener('change', logKey);
    function logKey(e) {
	let selectStart = e.target.selectionStart;
	let lastTyped = e.target.value.substr(selectStart, 1);
	document.getElementById("onChange").innerHTML = lastTyped;
    }

	</script>
  </body>
</html>
